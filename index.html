  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#9bb38a;\">Congregation<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#fbf4e7;\">May he judge your people in righteousness, your afflicted ones with justice.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#b3895f;\">Leader<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#e9dfcd;\">May the mountains bring prosperity to the people, the hills the fruit of righteousness.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#9bb38a;\">Congregation<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#fbf4e7;\">May he defend the afflicted among the people and save the children of the needy; may he crush the oppressor.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#b3895f;\">Leader<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#e9dfcd;\">May he rule from sea to sea and from the River to the ends of the earth.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#9bb38a;\">Congregation<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#fbf4e7;\">May the desert tribes bow before him and his enemies lick the dust. May all kings bow down to him and all nations serve him.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== NEXT WEEK PRAYER TEAM ===== -->\n      <div style=\"margin-top:14px; background:#fffdf9; border-radius:20px; padding:22px 24px; box-shadow:0 4px 16px rgba(120,96,60,.06);\">\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#b6a991;\">Next Week's Prayer Team<\u002Fdiv>\n        <div style=\"margin-top:14px; display:flex; flex-direction:column;\">\n          <div style=\"display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f2ebdd;\"><span style=\"font-size:13px; color:#4a4338;\">Sunday Svcs. 1–2<\u002Fspan><span style=\"font-size:12.5px; color:#9a8d77;\">Elder Kim Kyung-chae<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f2ebdd;\"><span style=\"font-size:13px; color:#4a4338;\">Sunday Svc. 3<\u002Fspan><span style=\"font-size:12.5px; color:#9a8d77;\">Sister Lee Ru-ri<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f2ebdd;\"><span style=\"font-size:13px; color:#4a4338;\">Sunday Afternoon<\u002Fspan><span style=\"font-size:12.5px; color:#9a8d77;\">Home Worship<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f2ebdd;\"><span style=\"font-size:13px; color:#4a4338;\">Wednesday Evening<\u002Fspan><span style=\"font-size:12.5px; color:#9a8d77;\">Deaconess Jeong Seon-hee<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; padding:8px 0;\"><span style=\"font-size:13px; color:#4a4338;\">Friday Holy Spirit Svc.<\u002Fspan><span style=\"font-size:12.5px; color:#9a8d77;\">Deacon Kim Ki-hyo<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===== SERVICE BOXES ===== -->\n      <div style=\"margin-top:14px; display:flex; flex-direction:column; gap:10px;\">\n        <div style=\"background:#fffdf9; border-radius:16px; padding:16px 18px; box-shadow:0 3px 12px rgba(120,96,60,.06);\">\n          <div style=\"font-size:13px; font-weight:700; color:#4a4338;\">Sunday Afternoon Service <span style=\"color:#a8917a; font-weight:500;\">· 3:30 PM<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-top:5px; font-size:12.5px; color:#8a7c68; line-height:1.55;\">Held as a home worship service. Please use \"Home Worship\" from the Ever-Flowing Springs devotional.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fffdf9; border-radius:16px; padding:16px 18px; box-shadow:0 3px 12px rgba(120,96,60,.06);\">\n          <div style=\"font-size:13px; font-weight:700; color:#4a4338;\">Wednesday Evening Service <span style=\"color:#a8917a; font-weight:500;\">· 7:00 PM<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-top:5px; font-size:12.5px; color:#8a7c68; line-height:1.6;\">Hymn 434 · Prayer — Deaconess Lim Hye-jeong · Ruth 4:9–15 · Praise — Maria Choir<br><span style=\"font-weight:600; color:#6b6048;\">\"From the Valley of Sorrow to a Song of Joy\"<\u002Fspan> — Pastor Bae Dong-hyun<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fffdf9; border-radius:16px; padding:16px 18px; box-shadow:0 3px 12px rgba(120,96,60,.06);\">\n          <div style=\"font-size:13px; font-weight:700; color:#4a4338;\">Dawn Prayer <span style=\"color:#a8917a; font-weight:500;\">· 5:30 AM Mon–Fri / 6:30 AM Sat<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-top:5px; font-size:12.5px; color:#8a7c68; line-height:1.55;\">Held every weekday at the main sanctuary.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fffdf9; border-radius:16px; padding:16px 18px; box-shadow:0 3px 12px rgba(120,96,60,.06);\">\n          <div style=\"font-size:13px; font-weight:700; color:#4a4338;\">Friday Holy Spirit Service <span style=\"color:#a8917a; font-weight:500;\">· 8:00 PM<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-top:5px; font-size:12.5px; color:#8a7c68; line-height:1.55;\">Praise — Holy Heart Praise Team · Prayer — Deacon Oh Seung-yong · Sermon — Pastor Bae Dong-hyun<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===== SERMON: NOURISHMENT FOR THE SOUL ===== -->\n      <div style=\"margin-top:26px; background:#4a4035; border-radius:18px; padding:20px 22px; color:#efe7d8;\">\n        <div style=\"font-size:10px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#c2b49c;\">Page 2<\u002Fdiv>\n        <div style=\"margin-top:6px; font-size:20px; font-weight:800; color:#fffaf0;\">Nourishment for the Soul<\u002Fdiv>\n        <div style=\"margin-top:6px; font-size:12.5px; color:#d8cdb8; line-height:1.5; font-style:italic;\">\"Your word is a lamp for my feet, a light on my path.\" (Psalm 119:105)<\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ showReflection }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"margin-top:14px; background:#fffdf9; border-radius:20px; padding:26px 24px; box-shadow:0 4px 16px rgba(120,96,60,.06);\">\n        <div style=\"text-align:center;\">\n          <div style=\"font-size:21px; font-weight:800; color:#2e2a22; line-height:1.3; letter-spacing:-.01em;\">The Song of the Bow: A Reign That Begins With Tears<\u002Fdiv>\n          <div style=\"margin-top:6px; font-size:12.5px; color:#a8917a;\">2 Samuel 1:17–27 · Rev. Ko Dong-hoon<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:18px; font-size:14px; line-height:1.75; color:#5f5849;\">The novelist Pearl Buck once said that only someone who has known deep sorrow and shed genuine tears can sing a song that truly moves the human heart. No matter how skilled or capable a person is, one who has never wept cannot accomplish anything truly great — it is the person with tears who can move more hearts and shape a bigger world. Today's passage marks one of the greatest turning points in Israel's history. Humanly speaking, for David — who had spent over a decade fleeing King Saul, who had hunted him relentlessly — Saul's tragic death in battle against the Philistines might have looked like the best possible outcome, the moment his kingship was finally within reach. Yet David did the opposite of what anyone would expect: he grieved for Saul and Jonathan, composed the lament called \"the Song of the Bow,\" and called on the people to mourn together. Rather than feeling relieved at his enemy's death, David was devastated that the Lord's anointed had fallen. David's reign began not with a glittering crown, but with tears of mourning for his enemy.<\u002Fdiv>\n\n        <div style=\"margin-top:22px;\">\n          <div style=\"font-size:15px; font-weight:700; color:#3a342c; line-height:1.4;\">1. We must weep tears that cover others' faults and honor what was beautiful in them.<\u002Fdiv>\n          <div style=\"margin-top:8px; font-size:13.5px; line-height:1.7; color:#7d7361;\">David named this lament for the tribe of Judah \"the Song of the Bow.\" The Hebrew word for bow, kesheth, also carries the meaning \"rainbow\" — evoking the new beginning God promised humanity after the flood, and it doubly signifies honor for one who died in battle by the bow, in keeping with divine justice. Rather than branding Saul a tyrant, David sang the tribute of Israel's \"glory\" — a spiritual respect for the one anointed by God, despite his flaws, and a love that covers the faults of an enemy. Though Saul's final years brought moral failure, David chose to remember instead the courage and honor of the young man first anointed. This mirrors the practice among some African communities of publicly recalling a wrongdoer's earlier good deeds even while confronting the wrong — helping restore rather than merely condemn.<\u002Fdiv>\n          <div style=\"margin-top:10px; font-size:13.5px; line-height:1.7; color:#7d7361;\">In this way, David's tears covered Saul's faults with grace and bound Israel back together as one spiritual community — the true governance of tears. Just as Christ's tears on the cross forgave His enemies, tears shed in reverence before God even over an enemy's death are holy. In an age quick to condemn others and celebrate their misfortune, we should not be people who pick up a bow to shoot others down, but people of the bow-song — who cover faults with grace and remember what was beautiful, even through tears.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:20px;\">\n          <div style=\"font-size:15px; font-weight:700; color:#3a342c; line-height:1.4;\">2. We must weep tears that reject the world's scorn and instead seek God's glory.<\u002Fdiv>\n          <div style=\"margin-top:8px; font-size:13.5px; line-height:1.7; color:#7d7361;\">As David began his reign with tears, his greatest concern was not his own safety or claim to the throne, but God's glory alone. He did not want Israel's humiliating defeat announced in Gath or Ashkelon, becoming fodder for Gentile mockery. Had David been driven by personal ambition, Saul's death might have been cause for private celebration — but David saw it only as a wound to the nation. He also mourned deeply for Jonathan, his soul-brother, describing Jonathan's love as \"more wonderful than that of women\" — a love that transcends human limits. Even amid the political rivalry for the throne, Jonathan had protected David as a true friend, and David's tears here honored that costly loyalty.<\u002Fdiv>\n          <div style=\"margin-top:10px; font-size:13.5px; line-height:1.7; color:#7d7361;\">Like Augustine, who wept over the world's mockery of the church during its thirteen years of persecution and in response wrote \"The City of God,\" David also refused to answer worldly scorn with anger, choosing instead tears that upheld God's glory. The tears we as believers shed should not be only for our own pain, but for moments when God's glory is obscured and the church is slandered before the world. When we weep first for God's glory, He captures our hearts and grants us the grace to build something new.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:20px; padding:18px 18px; background:#f3ebde; border-radius:14px; font-size:13.5px; line-height:1.7; color:#6b6048;\">Today's passage closes with a grand lament over the deaths of Saul and Jonathan — tragic and dramatic though the moment was, David transformed it not into personal vengeance but into worship shaped by God's providence. Though David became king, he still honored the man who once destroyed his enemy's dignity and did not let his name fall from the earth's memory. This is the nation's founding story: a nation established through tears rather than triumphant self-assertion. Even generations later, this legacy of grace and reconciliation would extend to Saul's crippled grandson Mephibosheth. May we, the members of Holy Gate Church, cover others' faults with love, honor what was beautiful in them, and — keeping God's glory alone in our hearts — weep the kind of tears that capture God's heart and allow His providence to build something new through our lives.<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== CHURCH NEWS HEADER ===== -->\n      <div style=\"margin-top:26px; display:flex; justify-content:space-between; align-items:baseline;\">\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#b6a991;\">Church News<\u002Fdiv>\n        <div style=\"font-size:11px; color:#c2b6a0;\">pp. 3–4<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:8px; background:#e7d9bf; border-radius:14px; padding:12px 16px; font-size:12.5px; color:#6b6048; font-weight:600; text-align:center;\">Welcoming everyone visiting Holy Gate Church for the first time today — Welcome!<\u002Fdiv>\n\n      <!-- new members -->\n      <div style=\"margin-top:12px; background:#fffdf9; border-radius:18px; padding:18px 20px; box-shadow:0 4px 16px rgba(120,96,60,.06);\">\n        <div style=\"font-size:13.5px; font-weight:700; color:#3a342c;\">Welcoming New Members<\u002Fdiv>\n        <div style=\"margin-top:10px; display:flex; flex-direction:column; gap:6px;\">\n          <div style=\"font-size:12.5px; color:#8a7c68;\"><span style=\" ont-size:10px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#c2b49c;\">Page 5<\u002Fdiv>\n        <div style=\"margin-top:6px; font-size:20px; font-weight:800; color:#fffaf0;\">2026 Holy Gate Church Cell Leaders' Banquet<\u002Fdiv>\n        <div style=\"margin-top:6px; font-size:12.5px; color:#d8cdb8; line-height:1.5;\">Saturday, August 22, 9:30 AM · Worship Center (Main Sanctuary) &amp; Wilderness Art Center<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:14px; background:#fffdf9; border-radius:20px; padding:22px 24px; box-shadow:0 4px 16px rgba(120,96,60,.06);\">\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#b6a991;\">Schedule<\u002Fdiv>\n        <div style=\"margin-top:12px; display:flex; flex-direction:column;\">\n          <div style=\"display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid #f2ebdd;\"><span style=\"font-size:12.5px; color:#a8917a; font-weight:600;\">9:30–9:50<\u002Fspan><span style=\"font-size:13px; color:#4a4338;\">Gathering<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid #f2ebdd;\"><span style=\"font-size:12.5px; color:#a8917a; font-weight:600;\">9:50–10:00<\u002Fspan><span style=\"font-size:13px; color:#4a4338;\">Praise<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid #f2ebdd;\"><span style=\"font-size:12.5px; color:#a8917a; font-weight:600;\">10:00–11:30<\u002Fspan><span style=\"font-size:13px; color:#4a4338;\">Small Group Lecture — Director Lois Cho<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid #f2ebdd;\"><span style=\"font-size:12.5px; color:#a8917a; font-weight:600;\">11:30–12:00<\u002Fspan><span style=\"font-size:13px; color:#4a4338;\">Cell Leader Sharing<\u002Fs >Lecture topics<\u002Fspan> A Healthy Church and Small Groups; The Power of Communication for Small Group Leaders; Meditating on Scripture Through Questions; Small Group Leadership; Overcoming Obstacles in Small Groups<\u002Fdiv>\n          <div style=\"margin-top:8px; font-size:12.5px; color:#8a7c68; line-height:1.6;\"><span style=\"font-weight:600; color:#4a4338;\">Speaker<\u002Fspan> Director Lois Cho — Director, Small Group &amp; Leadership Academy; has trained small groups at Mokpo Sarang Church, Pohang Chungjin Church, Bundang Jigu Village Church, Yeongrak Church, Somang Church, and others.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== MISSIONARY PRAYER ===== -->\n      <div style=\"margin-top:14px; background:linear-gradient(160deg,#fffdf9,#f7f0e3); border-radius:20px; padding:24px; box-shadow:0 4px 16px rgba(120,96,60,.06);\">\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#b6a991;\">Missionary Prayer · Japan<\u002Fdiv>\n        <div style=\"margin-top:6px; font-size:17px; font-weight:700; color:#332e26;\">Missionary Park Yong-jeong · Ainomori Church<\u002Fdiv>\n        <div style=\"margin-top:16px; display:flex; flex-direction:column; gap:12px;\">\n          <div style=\"display:flex; gap:11px;\"><span style=\"font-size:13px; font-weight:800; color:#c0a87f; flex:none;\">1<\u002Fspan><div style=\"font-size:12.5px; line-height:1.65; color:#7d7361;\">Pray that discipleship &amp; nurture ministries (small group gatherings, women's ministry, prosperous-life ministry, youth department, children's Sunday school) stay passionate, and that the Holy Spirit moves powerfully even amid a shortage of leaders.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:11px;\"><span style=\"font-size:13px; font-weight:800; color:#c0a87f; flex:none;\">2<\u002Fspan><div style=\"font-size:12.5px; line-height:1.65; color:#7d7361;\">Pray that local believers' husbands, parents, children, and neighbors hear the gospel, that the great task of soul-winning takes place, and that they prepare well for the June baptisms (Munhaeran family).<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:11px;\"><span style=\"font-size:13px; font-weight:800; color:#c0a87f; flex:none;\">3<\u002Fspan><div style=\"font-size:12.5px; line-height:1.65; color:#7d7361;\">Give thanks for the second pregnancy of the eldest son's family and daughter-in-law (Simsujin), and pray that third son Hyeonsu grows even more devoted to God and the church during his military service.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:11px;\"><span style=\"font-size:13px; font-weight:800; color:#c0a87f; flex:none;\">4<\u002Fspan><div style=\"font-size:12.5px; line-height:1.65; color:#7d7361;\">Pray for their sabbatical from July 1 to August 31, during which they will return home; pray that worship and mission reporting go well during this time, and that God pours out abundant grace on Ainomori Church as well during their absence.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===== GIVING ===== -->\n      <div style=\"margin-top:26px; background:#fffdf9; border-radius:20px; padding:24px; box-shadow:0 4px 16px rgba(120,96,60,.06);\">\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#b6a991;\">Giving<\u002Fdiv>\n        <div style=\"margin-top:6px; font-size:20px; font-weight:700; color:#332e26;\">Online Offering<\u002Fdiv>\n        <div style=\"margin-top:16px; display:flex; flex-direction:column; gap:10px;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:center; background:#f6f1e9; border-radius:12px; padding:12px 15px;\"><span style=\"font-size:13.5px; font-weight:600; color:#4a4338;\">Tithes<\u002Fspan><span style=\"font-size:12.5px; color:#8a7c68; font-variant-numeric:tabular-nums;\">Woori 1005-103-883510<\u002Fspan><\u0
