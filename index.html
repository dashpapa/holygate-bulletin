  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#9bb38a;\">Congregation<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#fbf4e7;\">Rescue me, my God, from the hand of the wicked, from the grasp of those who are evil and cruel.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#b3895f;\">Leader<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#e9dfcd;\">For you have been my hope, Sovereign LORD, my confidence since my youth.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#9bb38a;\">Congregation<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#fbf4e7;\">From birth I have relied on you; you brought me forth from my mother's womb. I will ever praise you.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#b3895f;\">Leader<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#e9dfcd;\">I have become a sign to many; you are my strong refuge.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#9bb38a;\">Congregation<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#fbf4e7;\">My mouth is filled with your praise, declaring your splendor all day long.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== NEXT WEEK PRAYER TEAM ===== -->\n      <div style=\"margin-top:14px; background:#fffdf9; border-radius:20px; padding:22px 24px; box-shadow:0 4px 16px rgba(120,96,60,.06);\">\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#b6a991;\">Next Week's Praye us:20px; padding:22px 24px; box-shadow:0 4px 16px rgba(120,96,60,.06);\">\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#b6a991;\">July 2026 Service Committee<\u002Fdiv>\n        <div style=\"margin-top:14px;\">\n          <div style=\"font-size:13px; font-weight:700; color:#4a4338;\">Service 1<\u002Fdiv>\n          <div style=\"margin-top:4px; font-size:12px; color:#9a8d77; line-height:1.6;\"><span style=\"font-weight:600; color:#7d6f59;\">Ushers<\u002Fspan> Lee Sin-yeong, Han Mi-yeon, Kim Eun-suk, Cho In, Lee Gwang-ok<\u002Fdiv>\n          <div style=\"margin-top:6px; font-size:11.5px; color:#a8917a; line-height:1.65;\"><span style=\"font-weight:600; color:#7d6f59;\">Offering Team<\u002Fspan> ① Bae Suk-ja ② Yoo Geum-geum ③ Song Gil-dan ④ Oh Yeon-hwa ⑤ Jung Sun-im B ⑥ Kwon Mi-ra ⑦ Choir ⑧ Pyo Tae-sim ⑨ Kim Gwang-suk ⑩ Lee Seon-min ⑪ Shin Seong-sun ⑫ Lee Yun-jeong ⑬ Joo Yeon-jeong ⑭ Jeon Myeong-hui ⑮ Ko Jeong-hui ⑯ Kang In-suk<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:16px; padding-top:14px; border-top:1px solid #f2ebdd;\">\n          <div style=\"font-size:13px; font-weight:700; color:#4a4338;\">Service 2<\u002Fdiv>\n          <div style=\"margin-top:4px; font-size:12px; color:#9a8d77; line-height:1.6;\"><span style=\"font-weight:600; color:#7d6f59;\">Ushers<\u002Fspan> Seo Myeong-won, Han In-ok, Moon Yu-sun, Han Mi-yeon<\u002Fdiv>\n          <div style=\"margin-top:6px; font-size:11.5px; color:#a8917a; line-height:1.65;\"><span style=\"font-weight:600; color:#7d6f59;\">Offering Team<\u002Fspan> ① Choi Seong-ok ② Jung Yeong-sun ③ Seo Yeong-ja ④ Ahn Seung-ran ⑤ Lee Nan-ju ⑥ Jang Myeong-hui ⑦ Ko Gyeong-suk ⑧ Song Jeong-ae ⑨ Han Jeong-suk ⑩ Jang Mi-ja B ⑪ Choir ⑫ Lee Jong-sun ⑬ Nam Jeong-suk ⑭ Park Gyeong-seon ⑮ Hwang Yeong-ju ⑯ Seon Myeong-hui ⑰ Koo Geum-ok ⑱ Jeon Seon-ja ⑲ Oh Dal-sun ⑳ Kim Eun-hye<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===== SERMON: NOURISHMENT FOR THE SOUL ===== -->\n      <div style=\"margin-top:26px; background:#4a4035; border-radius:18px; padding:20px 22px; color:#efe7d8;\">\n        <div style=\"font-size:10px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#c2b49c;\">Page 2<\u002Fdiv>\n        <div style=\"margin-top:6px; font-size:20px; font-weight:800; color:#fffaf0;\">Nourishment for the Soul<\u002Fdiv>\n        <div style=\"margin-top:6px; font-size:12.5px; color:#d8cdb8; line-height:1.5; font-style:italic;\">\"Your word is a lamp for my feet, a light on my path.\" (Psalm 119:105)<\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ showReflection }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"margin-top:14px; background:#fffdf9; border-radius:20px; padding:26px 24px; box-shadow:0 4px 16px rgba(120,96,60,.06);\">\n        <div style=\"text-align:center;\">\n          <div style=\"font-size:21px; font-weight:800; color:#2e2a22; line-height:1.3; letter-spacing:-.01em;\">Those Who Call on the Name of the LORD Plant a Tamarisk Tree<\u002Fdiv>\n          <div style=\"margin-top:6px; font-size:12.5px; color:#a8917a;\">Genesis 21:33 · Rev. Ko Dong-hoon<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:18px; font-size:14px; line-height:1.75; color:#5f5849;\">Our lives often feel like an endless wilderness. There are times when scorching winds blow and the blazing sun beats down, leaving us lost with nowhere to go. Abraham, our father in faith, likewise stood in the harshest, most barren wilderness of his life. After a long struggle with Abimelech, king of Gerar, over a well, he finally resolved the matter and made a peace covenant at Beersheba — a name meaning \"well of the oath.\" At the very moment his long tension finally lifted and he found the peace of life, Abraham's first act was, unexpectedly, to plant a tamarisk tree in the middle of the desert and call upon the name of the LORD, the Eternal God. Today we will explore the three spiritual meanings Abraham placed in that tamarisk tree, and hear together the gentle voice God speaks to us as we live in this age.<\u002Fdiv>\n\n        <div style=\"margin-top:22px;\">\n          <div style=\"font-size:15px; font-weight:700; color:#3a342c; line-height:1.4;\">1. We Must Have \"Deep Roots\" That Do Not Waver: A Life of Trusting in the Eternal God<\u002Fdiv>\n          <div style=\"margin-top:8px; font-size:13.5px; line-height:1.7; color:#7d7361;\">The tamarisk tree, well known in Scripture, possesses remarkable vitality that allows it to survive in harsh desert conditions. It may appear slender and soft on the outside, but to withstand the desert's brutal climate it drives its roots 30 to 50 meters into the ground to find water. When Abraham planted this deeply rooted tamarisk tree, the very first thing he did was call upon the name of \"the LORD, the Eternal God (El Olam).\" Though Abraham was a nomad who never knew when he might have to move on, his eyes were fixed on the Eternal God — the unseen source of living water.<\u002Fdiv>\n          <div style=\"margin-top:10px; font-size:13.5px; line-height:1.7; color:#7d7361;\">The trees of this world focus on growing visible trunks and leaves. But the secret of the tamarisk and the trees of the forest is that they stake their lives on invisible roots. How beautiful our faith appears on the outside matters little. The only secret to surviving in a desert-like world is to drive deep roots into the Eternal God, the source of grace that never runs dry. When our faith community intertwines its roots and lifts one another up in prayer, we will overcome any storm with ease. When life feels dry and shaky, may we be blessed to look not to our circumstances but to sink our roots ever deeper into the Eternal LORD.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:20px;\">\n          <div style=\"font-size:15px; font-weight:700; color:#3a342c; line-height:1.4;\">2. We Must Cultivate the Ability to \"Make Shade\": A Life That Brings Comfort and Rest to the World<\u002Fdiv>\n          <div style=\"margin-top:8px; font-size:13.5px; line-height:1.7; color:#7d7361;\">Another reason Abraham planted a tamarisk tree at Beersheba was its unique \"shade effect.\" The tamarisk absorbs moisture from the night air through its leaves and releases dew in the morning. When the daytime sun beats down, this moisture evaporates and lowers the temperature around the tree by 3 to 5 degrees Celsius — a natural cooling effect. This is why the tamarisk became the most refreshing shelter of rest for weary travelers and animals crossing the desert. Abraham's life itself became a channel of blessing to his neighbors.<\u002Fdiv>\n          <div style=\"margin-top:10px; font-size:13.5px; line-height:1.7; color:#7d7361;\">The world we live in is like a desert full of competition and wounds, and each day we experience spiritual exhaustion. What we need at such times is the Eternal Tamarisk — Jesus Christ. The LORD invites us to be the tamarisk trees of this age. When we ourselves encounter the refreshing shade of Christ's grace, we must then offer that same rest to our weary neighbors. Just as the tamarisk draws up moisture and creates shade, we too must give what we have to bring peace to the world. May the faithful of Holy Gate Church — people of glorious faith — live as channels of blessing and comfort, creating a shade the world cannot offer.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:20px;\">\n          <div style=\"font-size:15px; font-weight:700; color:#3a342c; line-height:1.4;\">3. We Must Plant \"Trees for the Next Generation\": A Life That Builds the Kingdom of God for Our Descendants<\u002Fdiv>\n          <div style=\"margin-top:8px; font-size:13.5px; line-height:1.7; color:#7d7361;\">The tamarisk is a very slow-growing tree. When Abraham planted it, he himself could not enjoy its full, cool shade. That shade was for his son Isaac, his grandson Jacob, and even — hundreds of years later — for King Saul's officials who rested beneath it. Abraham planted not for his own benefit but for the next generation and the future, trusting in God's promise.<\u002Fdiv>\n          <div style=\"margin-top:10px; font-size:13.5px; line-height:1.7; color:#7d7361;\">Like the elder in Jean Giono's story who silently planted 100,000 acorns a day in a barren plateau and — 30 years later — achieved a great forest of life, the tears and faith we sow today will never be wasted before God. Our prayers are never selfish, expecting an immediate answer. Devotion to raising children in faith and investing in their growth may not bear visible fruit before our eyes today, but it will surely become a great forest of blessing for the next generation. Even if we cannot do much right now, may we be blessed to plant trees of faith, longing for the great Kingdom of God our future descendants will enjoy.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:20px; padding:18px 18px; background:#f3ebde; border-radius:14px; font-size:13.5px; line-height:1.7; color:#6b6048;\">By planting a tamarisk tree in the barren Beersheba, Abraham declared by faith that this place was no longer a forsaken wilderness but a mountain ruled by the Eternal God. If your soul feels dry and weary today, plant a tamarisk tree of faith right where you stand and call upon the name of the LORD, the Eternal One. As we daily deepen our roots in his word and prayer, hold fast to the faithful promises of God, and call upon the name of the Eternal LORD, God will draw near to our lives and pour out his life-giving vitality from heaven. And through us and our families, the blessed history of countless weary souls finding rest and refreshment will unfold. May we sink our roots deep in the word, bring the refreshing grace of Christ to our neighbors, and plant seeds of faith for the next generation — so that Holy Gate Church may grow into a lush and flourishing mountain of blessing. This we earnestly pray in the name of the LORD.<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== CHURCH NEWS HEADER ===== -->\n      <div style=\"margin-top:26px; display:flex; justify-content:space-between; align-items:baseline;\">\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#b6a991;\">Church News<\u002Fdiv>\n        <div style=\"font-size:11px; color:#c2b6a0;\">pp. 3–4<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:8px; background:#e7d9bf; border-radius:14px; padding:12px 16px; font-size:12.5px; color:#6b6048; font-weight:600; text-align:center;\">Welcoming everyone visiting Holy Gate Church for the first time today — Welcome!<\u002Fdiv>\n\n      <!-- new members -->\n      <div style=\"margin-top:12px; background:#fffdf9; border-radius:18px; padding:18px 20px; box-shadow:0 4px 16px rgba(120,96,60,.06);\">\n        <div style=\"font-size:13.5px; font-weight:700; color:#3a342c;\">Welcoming New Members<\u002Fdiv>\n        <div style=\"margin-top:10px; display:flex; flex-direction:column; gap:6px;\">\n          <div style=\"font-size:12.5px; color:#8a7c68;\"><span style=\"color:#c0a87f; font-weight:600;\">[26-53]<\u002Fspan> Oh Jeong-seop <span style=\"color:#a8917a;\">(Ref. Min Jeong-gi / HolyWave)<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#8a7c68;\"><span style=\"color:#c0a87f; font-weight:600;\">[26-54]<\u002Fspan> Shin Yeong-seon <span style=\"color:#a8917a;\">(Ref. Self / HolyGloria)<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#8a7c68;\"><span style=\"color:#c0a87f; font-weight:600;\">[26-55]<\u002Fspan> Jeong Ji-yong <span style=\"color:#a8917a;\">(Ref. Self / HolyFlow)<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Announcements -->\n      <div style=\"margin-top:14px; background:#fffdf9; border-radius:20px; padding:8px 22px; box-shadow:0 4px 16px rgba(120,96,60,.06);\">\n
