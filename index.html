  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

background:#4a4035; border-radius:20px; padding:26px 24px; color:#efe7d8;\">\n        <div style=\"font-size:10.5px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#c2b49c;\">Responsive Reading · No. 31<\u002Fdiv>\n        <div style=\"margin-top:7px; font-size:18px; font-weight:700; color:#fffaf0;\">Psalm 68<\u002Fdiv>\n        <div style=\"margin-top:16px; display:flex; flex-direction:column; gap:13px;\">\n          <div><div style=\"font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#b3895f;\">Leader<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#e9dfcd;\">May the righteous be glad and rejoice before God; may they be happy and joyful.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#9bb38a;\">All<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#fbf4e7;\">Sing to God, sing in praise of his name, extol him who rides on the clouds; rejoice before him — his name is the LORD.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#b3895f;\">Leader<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#e9dfcd;\">A father to the fatherless, a defender of widows, is God in his holy dwelling.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#9bb38a;\">All<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#fbf4e7;\">God sets the lonely in families, he leads out the prisoners with singing; but the rebellious live in a sun-scorched land.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#b3895f;\">Leader<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#e9dfcd;\">But the wicked perish — though God's people are like the prime of the flock, the rebellious live in a parched land.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#9bb38a;\">All<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#fbf4e7;\">Your people settled in it, and from your bounty, God, you provided for the poor.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== THIS WEEK ===== -->\n      <div style=\"margin-top:26px; background:#fffdf9; border-radius:20px; padding:24px; box-shadow:0 4px 16px rgba(120,96,60,.06);\">\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#b6a991;\">This Week at Church<\u002Fdiv>\n        <div style=\"margin-top:6px; font-size:20px; font-weight:700; color:#332e26; margin-bottom:6px;\">Weekly Worship<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column;\">\n          <div style=\"padding:14px 0; border-bottom:1px solid #f2ebdd;\">\n            <div style=\"display:flex; justify-content:space-between; align-items:baseline;\"><span style=\"font-size:14px; font-weight:600; color:#4a4338;\">Sunday Afternoon<\u002Fspan><span style=\"font-size:13px; color:#a8917a; font-weight:600;\">3:30 PM<\u002Fspan><\u002Fdiv>\n            <div style=\"margin-top:3px; font-size:12px; color:#9a8d77; line-height:1.5;\">Home Worship — held by each household. Use the \"Home Worship\" app for daily devotional living.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:14px 0; border-bottom:1px solid #f2ebdd;\">\n            <div style=\"display:flex; justify-content:space-between; align-items:baseline;\"><span style=\"font-size:14px; font-weight:600; color:#4a4338;\">Wednesday Evening<\u002Fspan><span style=\"font-size:13px; color:#a8917a; font-weight:600;\">7:00 PM<\u002Fspan><\u002Fdiv>\n            <div style=\"margin-top:3px; font-size:12px; color:#9a8d77; line-height:1.5;\">John 21:15–19 · \"Instead of Despair, Love; Instead of Hopelessness, a Way\" — Ev. Choe Ju-hyeon<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:14px 0; border-bottom:1px solid #f2ebdd;\">\n            <div style=\"display:flex; justify-content:space-between; align-items:baseline;\"><span style=\"font-size:14px; font-weight:600; color:#4a4338;\">Dawn Prayer<\u002Fspan><span style=\"font-size:13px; color:#a8917a; font-weight:600;\">5:30 AM<\u002Fspan><\u002Fdiv>\n            <div style=\"margin-top:3px; font-size:12px; color:#9a8d77;\">Mon–Fri · 6:30 AM Saturday · Main Sanctuary<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:14px 0 0;\">\n            <div style=\"display:flex; justify-content:space-between; align-items:baseline;\"><span style=\"font-size:14px; font-weight:600; color:#4a4338;\">Friday Holy Spirit<\u002Fspan><span style=\"font-size:13px; color:#a8917a; font-weight:600;\">8:00 PM<\u002Fspan><\u002Fdiv>\n            <div style=\"margin-top:3px; font-size:12px; color:#9a8d77;\">Holy Heart Worship · Sermon — Ev. Lee Jun-young<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===== REFLECTION ===== -->\n      <sc-if value=\"{{ showReflection }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"margin-top:26px; background:#fffdf9; border-radius:20px; padding:26px 24px; box-shadow:0 4px 16px rgba(120,96,60,.06);\">\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#b6a991;\">Reflection<\u002Fdiv>\n        <div style=\"margin-top:8px; font-size:21px; font-weight:800; color:#2e2a22; line-height:1.25; letter-spacing:-.01em;\">Jabesh-Gilead, People Who Don't Forget Grace<\u002Fdiv>\n        <div style=\"margin-top:6px; font-size:12.5px; color:#a8917a;\">1 Samuel 31:7–13 · Rev. Ko Dong-hoon<\u002Fdiv>\n        <div style=\"margin-top:16px; font-size:14px; line-height:1.72; color:#5f5849;\">A life that remembers grace and lives to repay it is the proper way of a saint. In one of the darkest scenes in Israel's history — Saul's body disgraced on the walls of Beth Shan — the men of Jabesh-Gilead alone rose up, moved not by calculation but by grace remembered from 40 years before, when Saul had once rescued them.<\u002Fdiv>\n        <div style=\"margin-top:20px; display:flex; gap:13px;\">\n          <span style=\"font-size:15px; font-weight:800; color:#c0a87f; flex:none;\">1<\u002Fspan>\n          <div><div style=\"font-size:14.5px; font-weight:700; color:#3a342c; line-height:1.4;\">We must be \"spiritual warriors\" who do not forget grace.<\u002Fdiv><div style=\"margin-top:6px; font-size:13.5px; line-height:1.65; color:#7d7361;\">The men of Jabesh were ish chayil — not merely strong soldiers, but people of moral courage who risked their lives to keep faith with grace received long ago. True faith cannot abandon worship or dedication, whatever the circumstances.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:16px; display:flex; gap:13px;\">\n          <span style=\"font-size:15px; font-weight:800; color:#c0a87f; flex:none;\">2<\u002Fspan>\n          <div><div style=\"font-size:14.5px; font-weight:700; color:#3a342c; line-height:1.4;\">We must form a \"spiritual alliance\" that can overcome the world's criticism.<\u002Fdiv><div style=\"margin-top:6px; font-size:13.5px; line-height:1.65; color:#7d7361;\">By burying Saul's remains beneath the tamarisk tree and fasting seven days, Jabesh-Gilead claimed his pain as their own rather than joining in condemnation. When the world mocks the church, may we likewise weep together and overcome together.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:20px; padding:16px 18px; background:#f3ebde; border-radius:14px; font-size:14px; line-height:1.6; color:#6b6048; font-style:italic;\">God never forgets those who hold on to grace. May Holy Gate Church be found, in His eyes, among the faith heroes of Jabesh-Gilead.<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== CHURCH NEWS ===== -->\n      <div style=\"margin-top:26px;\">\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#b6a991; margin-bottom:13px; padding-left:2px;\">Church News<\u002Fdiv>\n        <div style=\"background:#fffdf9; border-radius:20px; padding:8px 22px; box-shadow:0 4px 16px rgba(120,96,60,.06);\">\n          <div style=\"display:flex; gap:13px; padding:16px 0; border-bottom:1px solid #f2ebdd;\"><div style=\"width:8px; height:8px; border-radius:99px; background:#5aa84a; margin-top:6px; flex:none;\"><\u002Fdiv><div><div style=\"font-size:14.5px; font-weight:700; color:#3a342c;\">Welcome, New Members<\u002Fdiv><div style=\"margin-top:3px; font-size:13px; color:#8a7c68; line-height:1.55;\">We warmly welcome Im Chang-ju, Sin Ha-eun, and Jo Sun-rye into our church family this week.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:13px; padding:16px 0; border-bottom:1px solid #f2ebdd;\"><div style=\"width:8px; height:8px; border-radius:99px; background:#3a9ad6; margin-top:6px; flex:none;\"><\u002Fdiv><div><div style=\"font-size:14.5px; font-weight:700; color:#3a342c;\">Senior Pastor Traveling<\u002Fdiv><div style=\"margin-top:3px; font-size:13px; color:#8a7c68; line-height:1.55;\">Rev. Ko Dong-hoon attends the Nampyeong Presbytery Senior Pastors' Retreat in China, July 6–10.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:13px; padding:16px 0; border-bottom:1px solid #f2ebdd;\"><div style=\"width:8px; height:8px; border-radius:99px; background:#c79a4a; margin-top:6px; flex:none;\"><\u002Fdiv><div><div style=\"font-size:14.5px; font-weight:700; color:#3a342c;\">2nd Quarter Deacons' Meeting<\u002Fdiv><div style=\"margin-top:3px; font-size:13px; color:#8a7c6
