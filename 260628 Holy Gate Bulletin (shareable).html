  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

=\"margin-top:6px; font-size:20px; font-weight:700; color:#332e26;\">Sunday Service<\u002Fdiv>\n        <div style=\"margin-top:16px; display:flex; gap:9px;\">\n          <div style=\"flex:1; text-align:center; padding:13px 4px; background:#f6f1e9; border-radius:14px;\"><div style=\"font-size:16px; font-weight:700; color:#4a4338;\">9:00<\u002Fdiv><div style=\"font-size:9.5px; letter-spacing:.06em; color:#b09b81; text-transform:uppercase; margin-top:3px; font-weight:600;\">1st<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1; text-align:center; padding:13px 4px; background:#e7d9bf; border-radius:14px;\"><div style=\"font-size:16px; font-weight:700; color:#4a4338;\">11:30<\u002Fdiv><div style=\"font-size:9.5px; letter-spacing:.06em; color:#9c8763; text-transform:uppercase; margin-top:3px; font-weight:700;\">2nd · EN<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1; text-align:center; padding:13px 4px; background:#f6f1e9; border-radius:14px;\"><div style=\"font-size:16px; font-weight:700; color:#4a4338;\">2:00<\u002Fdiv><div style=\"font-size:9.5px; letter-spacing:.06em; color:#b09b81; text-transform:uppercase; margin-top:3px; font-weight:600;\">3rd<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:18px; display:flex; flex-direction:column; gap:0;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline; padding:8px 0; border-bottom:1px solid #f2ebdd;\"><span style=\"font-size:13.5px; color:#4a4338;\">Opening Prayer<\u002Fspan><span style=\"font-size:12px; color:#a8917a;\">Worship Leader<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline; padding:8px 0; border-bottom:1px solid #f2ebdd;\"><span style=\"font-size:13.5px; color:#4a4338;\">Responsive Reading<\u002Fspan><span style=\"font-size:12px; color:#a8917a;\">No. 30 · Psalm 67<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline      <div style=\"background:#f3ebde; border-radius:12px; padding:11px 14px; font-size:12px; color:#7d6f59; line-height:1.5;\">✦ New Members' Class — Sundays 10:30 AM, Shalom Room.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===== RESPONSIVE READING ===== -->\n      <sc-if value=\"{{ showReading }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"margin-top:26px; background:#4a4035; border-radius:20px; padding:26px 24px; color:#efe7d8;\">\n        <div style=\"font-size:10.5px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#c2b49c;\">Responsive Reading · No. 30<\u002Fdiv>\n        <div style=\"margin-top:7px; font-size:18px; font-weight:700; color:#fffaf0;\">Psalm 67<\u002Fdiv>\n        <div style=\"margin-top:16px; display:flex; flex-direction:column; gap:13px;\">\n          <div><div style=\"font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#b3895f;\">Leader<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#e9dfcd;\">May God be gracious to us and bless us and make his face shine on us —<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#9bb38a;\">All<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#fbf4e7;\">so that your ways may be known on earth, your salvation among all nations.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#b3895f;\">Leader<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#e9dfcd;\">May the peoples praise you, God; may all the peoples praise you.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#9bb38a;\">All<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#fbf4e7;\">May the nations be glad and sing for joy, for you rule the peoples with equity and guide the nations of the earth.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#9bb38a;\">All<\u002Fdiv><div style=\"margin-top:4px; font-size:14px; line-height:1.55; color:#fbf4e7;\">The land yields its harvest; God, our God, blesses us — so that all the ends of the earth will fear him.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== THIS WEEK ===== -->\n      <div style=\"margin-top:26px; background:#fffdf9; border-radius:20px; padding:24px; box-shadow:0 4px 16px rgba(120,96,60,.06);\">\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#b6a991;\">This Week at Church<\u002Fdiv>\n        <div style=\"margin-top:6px; font-size:20px; font-weight:700; color:#332e26; margin-bottom:6px;\">Weekly Worship<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column;\">\n          <div style=\"padding:14px 0; border-bottom:1px solid #f2ebdd;\">\n            <div style=\"display:flex; justify-content:space-between; align-items:baseline;\"><span style=\"font-size:14px; font-weight:600; color:#4a4338;\">Sunday Afternoon<\u002Fspan><span style=\"font-size:13px; color:#a8917a; font-weight:600;\">3:30 PM<\u002Fspan><\u002Fdiv>\n            <div style=\"margin-top:3px; font-size:12px; color:#9a8d77; line-height:1.5;\">Home Worship — held by each household. Use the \"Home Worship\" app for daily devotional living.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:14px 0; border-bottom:1px solid #f2ebdd;\">\n            <div style=\"display:flex; justify-content:space-between; align-items:baseline;\"><span style=\"font-size:14px; font-weight:600; color:#4a4338;\">Wednesday Evening<\u002Fspan><span style=\"font-size:13px; color:#a8917a; font-weight:600;\">7:00 PM<\u002Fspan><\u002Fdiv>\n            <div style=\"margin-top:3px; font-size:12px; color:#9a8d77; line-height:1.5;\">Luke 14:7–14 · \"The Person God Exalts\" — Ev. Lee Jun-young<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:14px 0; border-bottom:1px solid #f2ebdd;\">\n            <div style=\"display:flex; justify-content:space-between; align-items:baseline;\"><span style=\"font-size:14px; font-weight:600; color:#4a4338;\">Dawn Prayer<\u002Fspan><span style=\"font-size:13px; color:#a8917a; font-weight:600;\">5:30 AM<\u002Fspan><\u002Fdiv>\n            <div style=\"margin-top:3px; font-size:12px; color:#9a8d77;\">Mon–Fri · 6:30 AM Saturday · Main Sanctuary<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:14px 0 0;\">\n            <div style=\"display:flex; justify-content:space-between; align-items:baseline;\"><span style=\"font-size:14px; font-weight:600; color:#4a4338;\">Friday Holy Spirit<\u002Fspan><span style=\"font-size:13px; color:#a8917a; font-weight:600;\">8:00 PM<\u002Fspan><\u002Fdiv>\n            <div style=\"margin-top:3px; font-size:12px; color:#9a8d77;\">Sermon — Rev. Hwang Ji-hu<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===== REFLECTION ===== -->\n      <sc-if value=\"{{ showReflection }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"margin-top:26px; background:#fffdf9; border-radius:20px; padding:26px 24px; box-shadow:0 4px 16px rgba(120,96,60,.06);\">\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#b6a991;\">Reflection<\u002Fdiv>\n        <div style=\"margin-top:8px; font-size:21px; font-weight:800; color:#2e2a22; line-height:1.25; letter-spacing:-.01em;\">Whether We Win or Lose, God Always Prevails<\u002Fdiv>\n        <div style=\"margin-top:6px; font-size:12.5px; color:#a8917a;\">1 Samuel 31:1–6<\u002Fdiv>\n        <div style=\"margin-top:16px; font-size:14px; line-height:1.72; color:#5f5849;\">Today's passage shows the darkest scene of the war — Israel routed at Gilboa. From a human view it is catastrophe, yet seen through a spiritual lens the fall was never God's failure. As a corrupt dynasty crumbled and a man after God's own heart was raised in its place, the great triumph of God began in earnest.<\u002Fdiv>\n        <div style=\"margin-top:20px; display:flex; gap:13px;\">\n          <span style=\"font-size:15px; font-weight:800; color:#c0a87f; flex:none;\">1<\u002Fspan>\n          <div><div style=\"font-size:14.5px; font-weight:700; color:#3a342c; line-height:1.4;\">God accomplishes His good purposes — not by coincidence, but by providence.<\u002Fdiv><div style=\"margin-top:6px; font-size:13.5px; line-height:1.65; color:#7d7361;\">When God allows failure, He is laying the foundation of your eternal purpose on top of your ruin. Even in the place of ruin, do not despair — trust His providence.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:16px; display:flex; gap:13px;\">\n          <span style=\"font-size:15px; font-weight:800; color:#c0a87f; flex:none;\">2<\u002Fspan>\n          <div><div style=\"font-size:14.5px; font-weight:700; color:#3a342c; line-height:1.4;\">God achieves His great victory regardless of our success or failure.<\u002Fdiv><div style=\"margin-top:6px; font-size:13.5px; line-height:1.65; color:#7d7361;\">The final victory trophy is already firmly in the hands of our Father God, and it will ultimately be ours.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:20px; padding:16px 18px; background:#f3ebde; border-radius:14px; font-size:14px; line-height:1.6; color:#6b6048; font-style:italic;\">\"Even in temporary defeat, this too is God's victory.\" Lift your head to the hill and the cross — the site of history's greatest triumph.<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== CHURCH NEWS ===== -->\n      <div style=\"margin-top:26px;\">\n        <div style=\"font-size:11px
